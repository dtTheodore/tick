# Local Postgres for development.
#
# Host port comes from $PLATFORM_DB_PORT; data lives under
# ./.local/postgres-data (gitignored).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dopamint
      POSTGRES_PASSWORD: dopamint
      POSTGRES_DB: dopamint
    ports:
      - "${PLATFORM_DB_PORT}:5432"
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopamint -d dopamint"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PLATFORM_REDIS_PORT}:6379"
    volumes:
      - ./.local/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
